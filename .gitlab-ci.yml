image: node:20-alpine

cache:
  paths:
    - .npm/

before_script:
  - rm -rf node_modules package-lock.json
  - npm cache clean --force
  - npm install

pages:
  stage: deploy
  script:
    - npm run build
    - rm -rf public
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
