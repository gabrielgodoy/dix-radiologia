name: Deploy Vite Site to GitHub Pages

on:
  push:
    branches:
      - main # ⚠️ Change this to "master" if your default branch uses that name

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Uses a stable Node LTS version
          cache: "npm" # Change to 'pnpm' or 'yarn' if using alternative package managers

      - name: Install Dependencies
        run: npm ci # Use 'npm install' if you do not have a package-lock.json

      - name: Build Project
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./dist" # Vite outputs production assets to the 'dist' folder by default

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
